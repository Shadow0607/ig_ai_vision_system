version: '3.8'

services:
  # === MySQL 8.0 資料庫 ===
  mysql:
    image: mysql:8.0
    container_name: ai_vision_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./state_management/ig_ai_system.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ai_net

  # === 🌟 補回 Redis (因為 Program.cs 有用到) ===
  redis:
    image: redis:7-alpine
    container_name: ai_vision_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - ai_net

  # === MinIO 物件儲存 ===
  minio:
    image: minio/minio:latest
    container_name: ai_vision_minio
    restart: always
    environment:
      # 🌟 修正：名稱對齊 .env 與 C# 程式碼
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ai_net

  # === MinIO 初始化 ===
  minio-init:
    image: minio/mc:latest
    container_name: ai_vision_minio_init
    depends_on:
      - minio
    environment:
      # 🌟 修正：名稱對齊 .env 與 C# 程式碼
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    networks:
      - ai_net
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/ig-ai-assets --ignore-existing;
      mc anonymous set download myminio/ig-ai-assets;
      exit 0;
      "

  # === Qdrant 向量資料庫 ===
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_vision_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_net

  # === Ethereum 區塊鏈私有節點 ===
  # === Ethereum 區塊鏈私有節點 (資安強化版) ===
  ethereum-node:
    image: ethereum/client-go:latest
    container_name: ai_vision_private_chain
    restart: always
    ports:
      # 🌟 修正 1：將連接埠僅綁定於本機 127.0.0.1，防止外部公網直接存取 8545
      - "127.0.0.1:8545:8545"
    volumes:
      - eth_data:/root/.ethereum
    networks:
      - ai_net
    command:
      - --dev
      - --dev.period=2
      - --http
      # 🌟 修正 2：內部監聽仍維持 0.0.0.0 以利 Docker 網路通信，但透過 ports 限制外部存取
      - --http.addr=0.0.0.0
      - --http.api=eth,web3,net,personal
      # 🌟 修正 3：嚴格限制 CORS 來源，僅允許您的 Vue 3 前端開發環境存取
      - --http.corsdomain=http://localhost:5173
      # 🌟 修正 4：嚴格限制 VHosts 虛擬主機，僅允許 localhost
      - --http.vhosts=localhost

volumes:
  mysql_data:
  minio_data:
  qdrant_data:
  eth_data:

networks:
  ai_net:
    driver: bridge